<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora Daniela Luther</title>
    
    <link rel="icon" type="image/png" href="Descargas/LOGO_CAPOUILLIEZ - Isotipos Blancos-07.png">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
        }

        body {
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        header {
            padding: 30px;
            background-color: #2d2d2d;
            border-bottom: 2px solid #ff00ff; 
            box-shadow: 0 0 15px #ff00ff;
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
        }

        .name-banner {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
        }

        main {
            flex: 1;
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .semana {
            background-color: #ffffff;
            color: #333;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
            border-left: 8px solid #ff00ff;
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .semana h3 {
            margin-top: 0;
            color: #d100d1;
        }

        .pdf-container {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: #ffe6f2;
            border-top: 3px solid #ff00ff;
        }

        footer span {
            font-weight: bold;
            color: #d100d1;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bitácora Segunda y Tercera Unidad</h1>
            <span class="c1">D</span><span class="c2">a</span><span class="c3">n</span><span class="c4">i</span><span class="c5">e</span><span class="c6">l</span><span class="c7">a</span> 
            &nbsp;
            <span class="c7">L</span><span class="c6">u</span><span class="c5">t</span><span class="c4">h</span><span class="c3">e</span><span class="c2">r</span>
        </div>
    </header>

    <main>
        <div class="semana">
            <h3>Introducción Arduino</h3>
            <p>
                Análisis de la plataforma <b>Arduino</b>, componentes electrónicos y tipos de señales.
            </p>
            <div class="pdf-container">
                <embed src="Arduino.pdf" type="application/pdf" width="100%" height="350px" />
            </div>
        </div>

        <div class="semana">
            <h3>Semana 2</h3>
            <p>Contenido en desarrollo para la siguiente entrega.</p>
        </div>
    </main>

    <footer>
        <span>@daniluther </span>
        <img src="https://www.capouilliez.edu.gt/panel-alumnos/assets/img/brand/capouilliez.svg"
    </footer>

</body>
</html>
